<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiu-Jitsu Techniekboek</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --card: #ffffff;
  --border: #e2ddd6;
  --text: #1c1917;
  --muted: #78716c;
  --faint: #f0ede8;
  --accent: #c0392b;
  --accent-light: #fef2f2;
  --blue: #1e3a5f;
  --blue-light: #eff6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: 'Crimson Pro', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--blue); padding: 20px 20px 0; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.brand-sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; color: #93c5fd; text-transform: uppercase; margin-bottom: 4px; }
.brand-title { font-size: 28px; font-weight: 600; color: #fff; }
.brand-count { font-family: 'DM Mono', monospace; font-size: 12px; color: #93c5fd; margin-top: 2px; }
.btn-primary { background: var(--accent); color: #fff; border: none; padding: 10px 16px; font-size: 14px; font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 4px; white-space: nowrap; }
.btn-primary:active { opacity: 0.8; }

/* SEARCH */
.search-wrap { padding: 0 0 16px; position: relative; }
.search-input { width: 100%; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 11px 40px 11px 14px; font-size: 15px; font-family: 'Crimson Pro', serif; border-radius: 6px; outline: none; }
.search-input::placeholder { color: rgba(255,255,255,0.5); }
.search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.6); font-size: 20px; cursor: pointer; display: none; }

/* TABS */
.tabs { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.1); }
.tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.5); padding: 12px 16px; font-size: 14px; font-family: 'Crimson Pro', serif; cursor: pointer; white-space: nowrap; margin-bottom: -1px; transition: color 0.15s; }
.tab.active { color: #fff; border-bottom-color: #fff; }

/* MAIN */
.main { padding: 20px; }
.section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }

/* CARDS GRID */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

/* POSITION CARD */
.pos-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid; padding: 18px; cursor: pointer; transition: box-shadow 0.15s; -webkit-tap-highlight-color: transparent; }
.pos-card:active { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.pos-japans { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.pos-naam { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
.pos-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--faint); margin-top: 8px; }
.pos-count-num { font-size: 20px; font-weight: 600; }
.pos-bekijk { font-family: 'DM Mono', monospace; font-size: 11px; }

/* TECHNIQUE CARD */
.tech-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid; padding: 18px; }
.tech-cat-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.tech-naam { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.tech-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.tech-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 3px 8px; border-radius: 20px; border: 1px solid; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.tech-notities { font-size: 14px; color: var(--muted); line-height: 1.6; border-top: 1px solid var(--faint); padding-top: 10px; margin-top: 8px; }
.tech-actions { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
.btn-sm { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 4px; }
.btn-del { border-color: #fecaca; color: var(--accent); }
.btn-fav { background: none; border: none; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }

/* UITLEG TOGGLE */
.uitleg-toggle { width: 100%; background: transparent; padding: 9px 0; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 4px; margin-top: 12px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
.uitleg-panel { border-radius: 0 0 6px 6px; border-top: none; margin-top: 0; }
.uitleg-tabs { display: flex; background: var(--faint); border-radius: 6px 6px 0 0; overflow: hidden; }
.uitleg-tab { flex: 1; background: transparent; border: none; border-bottom: 2px solid transparent; padding: 10px 4px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; color: var(--muted); text-align: center; -webkit-tap-highlight-color: transparent; }
.uitleg-tab.active { color: var(--text); border-bottom-color: currentColor; }
.uitleg-body { background: var(--faint); border-radius: 0 0 6px 6px; padding: 16px; }

/* STAPPEN */
.stap { display: flex; gap: 12px; margin-bottom: 18px; }
.stap-nr { min-width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.stap-titel { font-size: 15px; font-weight: 600; margin-bottom: 4px; font-style: italic; }
.stap-uitleg { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
.stap-lichaam { background: var(--card); border-left: 2px solid; padding: 6px 10px; font-size: 12px; color: var(--text); border-radius: 0 4px 4px 0; margin-bottom: 6px; }
.stap-aandacht { font-size: 12px; color: var(--muted); font-style: italic; display: flex; gap: 5px; }
.finishing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.finish-box { padding: 10px 12px; border-radius: 6px; }
.finish-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
.finish-text { font-size: 13px; color: var(--text); line-height: 1.5; }

/* VERDEDIGING */
.verd-item { display: flex; gap: 12px; margin-bottom: 16px; }
.verd-icon-wrap { min-width: 28px; height: 28px; border-radius: 50%; background: #dcfce7; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.verd-titel { font-size: 15px; font-weight: 600; font-style: italic; margin-bottom: 3px; }
.verd-uitleg { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* VIDEO */
.video-btn-wrap { text-align: center; padding: 12px 0; }
.video-btn { display: inline-flex; align-items: center; gap: 10px; background: #ff0000; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 13px; }
.play-icon { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 13px solid white; }

/* DETAIL VIEW */
.detail-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
.btn-back { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 4px; }
.detail-pos-naam { font-size: 22px; font-weight: 600; }
.detail-pos-japans { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
.detail-body { padding: 20px; max-width: 900px; }
.detail-sub-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.detail-sub-tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 10px 18px; font-size: 15px; font-family: 'Crimson Pro', serif; cursor: pointer; margin-bottom: -2px; -webkit-tap-highlight-color: transparent; }
.detail-sub-tab.active { color: var(--text); border-bottom-color: var(--text); }
.btn-add-sub { width: 100%; margin-top: 20px; background: transparent; padding: 12px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase; }

/* ESCAPE */
.escape-situatie { background: var(--card); border-radius: 8px; border-left: 4px solid; padding: 14px 18px; margin-bottom: 20px; font-size: 14px; color: var(--muted); }
.escape-stap { display: flex; gap: 12px; margin-bottom: 18px; }
.escape-counter { border-radius: 8px; padding: 14px 18px; margin-top: 8px; }
.escape-counter-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }

/* WORPEN */
.worp-cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
.worp-cat-title { font-size: 20px; font-weight: 600; }
.worp-cat-desc { font-size: 13px; color: var(--muted); margin-top: 1px; }
.worp-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid; padding: 16px; }
.worp-naam { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
.worp-japans { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; }
.worp-uitleg { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.kuzushi-box { border-left: 3px solid; padding: 6px 10px; border-radius: 0 4px 4px 0; margin-bottom: 12px; }
.kuzushi-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
.kuzushi-text { font-size: 13px; }

/* LOGBOEK */
.log-sub-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.log-sub-tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 10px 18px; font-size: 15px; font-family: 'Crimson Pro', serif; cursor: pointer; margin-bottom: -2px; -webkit-tap-highlight-color: transparent; }
.log-sub-tab.active { color: var(--text); border-bottom-color: var(--text); }
.log-form { background: var(--card); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid var(--blue); padding: 22px; margin-bottom: 22px; }
.sparring-form { border-left-color: var(--accent); }
.form-section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--blue); margin-bottom: 18px; }
.sparring-form .form-section-title { color: var(--accent); }
.form-label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.form-input { display: block; width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; font-size: 15px; font-family: 'Crimson Pro', serif; margin-bottom: 14px; border-radius: 6px; outline: none; -webkit-appearance: none; }
.form-input:focus { border-color: var(--blue); }
.techniek-list { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; margin-bottom: 14px; max-height: 300px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.techniek-cat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 4px 5px; border-bottom: 1px solid var(--border); margin-bottom: 3px; font-weight: 500; }
.techniek-check-row { display: flex; align-items: center; gap: 10px; padding: 6px 4px; border-bottom: 1px solid var(--faint); cursor: pointer; }
.techniek-check-row:last-child { border-bottom: none; }
.techniek-check-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
.techniek-check-label { font-size: 14px; cursor: pointer; }
.btn-save { width: 100%; background: var(--blue); color: #fff; border: none; padding: 12px; font-size: 15px; font-family: 'Crimson Pro', serif; cursor: pointer; border-radius: 6px; margin-top: 4px; }
.btn-save-sparring { background: var(--accent); }
.log-entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid var(--blue); padding: 16px 18px; margin-bottom: 12px; }
.sparring-entry { border-left-color: var(--accent); }
.log-entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.log-datum { font-size: 17px; font-weight: 600; }
.log-partner { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
.log-count-badge { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--blue-light); color: var(--blue); padding: 3px 10px; border-radius: 20px; }
.sparring-entry .log-count-badge { background: var(--accent-light); color: var(--accent); }
.btn-del-entry { background: none; border: none; color: #d1d5db; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; -webkit-tap-highlight-color: transparent; }
.tech-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.tech-chip { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--blue-light); color: var(--blue); padding: 3px 8px; border-radius: 20px; border: 1px solid #bfdbfe; }
.log-notities { font-size: 14px; color: var(--muted); line-height: 1.6; border-top: 1px solid var(--faint); padding-top: 10px; }
.sparring-section { margin-bottom: 10px; }
.sparring-section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.sparring-section-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
.takeaway-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 10px 14px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: var(--card); border-radius: 12px; padding: 26px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
.modal-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 11px 20px; font-size: 14px; font-family: 'Crimson Pro', serif; cursor: pointer; border-radius: 6px; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
.search-bar input { flex: 1; min-width: 0; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-size: 15px; font-family: 'Crimson Pro', serif; border-radius: 6px; outline: none; }
.btn-fav-filter { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 9px 14px; font-size: 14px; cursor: pointer; border-radius: 6px; white-space: nowrap; }
.btn-fav-filter.on { background: #fef2f2; border-color: var(--accent); color: var(--accent); }
.cat-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 20px; white-space: nowrap; }
.cat-btn.on { color: #fff; border-color: transparent; }

/* EMPTY STATE */
.empty { text-align: center; color: var(--muted); padding: 40px 20px; border: 1px dashed var(--border); border-radius: 10px; font-size: 15px; }

/* SEARCH RESULTS */
.search-results-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.result-group-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; }
mark { background: #fef08a; border-radius: 2px; padding: 0 2px; font-style: normal; }

@media (max-width: 600px) {
  .finishing-grid { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 1fr; }
  .modal { padding: 20px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════

const CATS = [
  { id:'verwurging', label:'Choke', icon:'🔒', color:'#8e44ad' },
  { id:'joint',      label:'Joint Lock', icon:'💪', color:'#2980b9' },
  { id:'worp',       label:'Throw', icon:'🌀', color:'#e67e22' },
  { id:'verdediging',label:'Defense', icon:'🛡️', color:'#27ae60' },
  { id:'overig',     label:'Other', icon:'📌', color:'#7f8c8d' },
];

const POSITIES = [
  { id:'mount', naam:'Mount', japans:'Tate-shiho-gatame', kleur:'#c0392b',
    tips:['Hips low','Weight on chest','Hands free'],
    escape:{ situatie:'You are on your back, opponent sits on your chest.', videoId:'SYel-mVSMAI',
      stappen:[
        { titel:'Elbows in', uitleg:'Pull both elbows tight to your body. Never let arms extend — that invites Americana or Armbar.' },
        { titel:'Bridge (Upa)', uitleg:'Plant one foot flat, grab his arm on one side, explosively bridge your hips and roll that direction. He tips over, you end up on top.' },
        { titel:'Elbow-knee escape', uitleg:'If bridge fails: push your elbow toward his knee on the same side. Create space, slide your hip out, bring your knee inside. Now you\'re in half guard or guard.' },
      ], counter:'From guard immediately attack — Kimura, Triangle or Armbar when he loses posture.'
    }
  },
  { id:'guard', naam:'Guard', japans:'Do-osae', kleur:'#2980b9',
    tips:['Control his posture','Legs active','Attack constantly'],
    escape:{ situatie:'You are kneeling between his legs — he controls from below.', videoId:'xYW7CCmA3ow',
      stappen:[
        { titel:'Build posture', uitleg:'Sit up straight, head up. Straight back makes it hard for him to pull you down for chokes or triangles.' },
        { titel:'Hands on hips', uitleg:'Place both hands on his hips. This gives you control and stops him from lifting his hips for triangles or omoplatas.' },
        { titel:'Open the guard', uitleg:'One hand on his chest, one on his knee. Stand on one foot, press his knee down and step back. His guard opens.' },
      ], counter:'Once guard is open, pass quickly to side control or half guard — open guard still has attacks.'
    }
  },
  { id:'side-control', naam:'Side Control', japans:'Yoko-shiho-gatame', kleur:'#8e44ad',
    tips:['Head low','Hip to hip','Control near arm'],
    escape:{ situatie:'You are on your back, opponent lies across your chest at 90 degrees.', videoId:'cuXq-k__9lQ',
      stappen:[
        { titel:'Protect near arm', uitleg:'Pull your closest arm immediately to your body. This arm is the first target for Americana or Kimura.' },
        { titel:'Bridge and turn', uitleg:'Plant your feet, bridge explosively and turn toward him. Bring your knees between you. Goal is to get on your side and re-guard.' },
        { titel:'Get underhook', uitleg:'Slide your bottom arm under his body for an underhook on his back. Whoever has underhook controls the position.' },
      ], counter:'From underhook you can roll him to turtle or half guard — both offer sweep and submission opportunities.'
    }
  },
  { id:'back-mount', naam:'Back Mount', japans:'Ushiro-kesa-gatame', kleur:'#e67e22',
    tips:['Hooks tight','Chin on shoulder','Control arm for choke'],
    escape:{ situatie:'Opponent sits behind you with both hooks in your hips — most dangerous position.', videoId:'dus6oFWKKBg',
      stappen:[
        { titel:'Chin to chest', uitleg:'Immediately press chin down. This protects your neck from the rear naked choke. One hand grabs his attacking arm.' },
        { titel:'Shoulder to mat', uitleg:'Go to your side by dropping one shoulder to the ground. Choose the side of his lower hook — makes one hook ineffective.' },
        { titel:'Work hook out', uitleg:'Grab his lower hook with your hand and pull his foot over your leg. Once one hook is out, turn to face him into his guard.' },
      ], counter:'Once in his guard you have escaped. Build posture immediately and open his guard — he just lost the worst position.'
    }
  },
  { id:'half-guard', naam:'Half Guard', japans:'Han-do-osae', kleur:'#27ae60',
    tips:['Get underhook','Turn to side','Sweep threatens submissions'],
    escape:{ situatie:'You are on your back with one of his legs trapped — he lies on top of you.', videoId:'nRFFmWCcgkE',
      stappen:[
        { titel:'Turn to side', uitleg:'Immediately turn to your side — lying flat on your back in half guard is dangerous. Side position gives room to underhook and attack.' },
        { titel:'Get underhook', uitleg:'Slide your bottom arm under his arm for an underhook on his back. Whoever has underhook controls half guard.' },
        { titel:'Close knees and sweep', uitleg:'With underhook and on your side: grab his leg with both hands and sweep him over you. Or use underhook to stand to single leg.' },
      ], counter:'A successful sweep puts you in side control or mount. From single leg you can finish a takedown.'
    }
  },
  { id:'turtle', naam:'Turtle', japans:'Kame', kleur:'#16a085',
    tips:['Head tucked in','Control hips','Pressure on back'],
    escape:{ situatie:'You are on hands and knees — opponent is on top or beside you.', videoId:'qshG7pBG1Ag',
      stappen:[
        { titel:'Protect head', uitleg:'Keep your head low and tucked. A raised head gives him room for guillotine or collar grip. Chin to chest.' },
        { titel:'Roll to guard', uitleg:'Wait for him to shift weight. Then roll quickly to your back and bring legs up for closed guard. Safest escape.' },
        { titel:'Stand to single leg', uitleg:'If he is at your side: plant outside foot, explosively stand and grab his leg for single leg takedown. Speed is crucial.' },
      ], counter:'From guard attack immediately with triangle, armbar or kimura when he loses posture.'
    }
  },
  { id:'north-south', naam:'North South', japans:'Kami-shiho-gatame', kleur:'#c0392b',
    tips:['Weight on chest','Hips low','Control both arms'],

// ═══════════════════════════════════════════════════════════
// STATE — plain object, no proxies
// ═══════════════════════════════════════════════════════════
function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}

const S = {
  technieken: loadJSON('jj_tech', DEFAULT_TECHNIEKEN),
  logboek:    loadJSON('jj_log', []),
  sparring:   loadJSON('jj_sparring', []),
  tab: 'posities',          // posities | worpen | technieken | logboek
  positieId: null,          // selected position id
  detailSubTab: 'subs',     // subs | escape
  uitlegOpen: {},           // {techId: bool}
  uitlegTab: {},            // {techId: 'video'|'stappen'|'verdediging'}
  zoek: '',
  globaalZoek: '',
  catFilter: 'alle',
  favFilter: false,
  logSubTab: 'training',    // training | sparring
  modal: null,              // null | 'techniek' | 'log' | 'sparring'
  editId: null,
  formPos: null,
  // Form data — read from DOM at submit
};

function save() {
  localStorage.setItem('jj_tech', JSON.stringify(S.technieken));
}
function saveLog() {
  localStorage.setItem('jj_log', JSON.stringify(S.logboek));
  localStorage.setItem('jj_sparring', JSON.stringify(S.sparring));
}

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE — innerHTML, all handlers via delegation
// ═══════════════════════════════════════════════════════════
function render() {
  document.getElementById('app').innerHTML = buildPage();
  bindEvents();
}

function buildPage() {
  if (S.positieId) return buildDetailPage();
  return buildMainPage();
}

// ── MAIN PAGE ──
function buildMainPage() {
  const isSearch = S.globaalZoek.trim().length > 0;
  return `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="brand-sub">武術 · Jiu-Jitsu</div>
          <div class="brand-title">Techniekboek</div>
          <div class="brand-count">${S.technieken.length} techniques</div>
        </div>
        <button class="btn-primary" id="btn-new-tech">+ New</button>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="global-search" type="text" placeholder="🔍  Search technique, position or keyword..." value="${esc(S.globaalZoek)}">
        <button class="search-clear" id="search-clear" style="display:${S.globaalZoek?'block':'none'}">×</button>
      </div>
      ${!isSearch ? `
      <div class="tabs">
        <button class="tab ${S.tab==='posities'?'active':''}" data-tab="posities">🥋 Positions</button>
        <button class="tab ${S.tab==='worpen'?'active':''}" data-tab="worpen">🌀 Throws</button>
        <button class="tab ${S.tab==='technieken'?'active':''}" data-tab="technieken">📋 Techniques</button>
        <button class="tab ${S.tab==='logboek'?'active':''}" data-tab="logboek">📓 Log</button>
      </div>` : ''}
    </div>
    <div class="main">
      ${isSearch ? buildSearchResults() : buildTab()}
    </div>
    ${S.modal ? buildModal() : ''}
  `;
}

function buildTab() {
  if (S.tab === 'posities')  return buildPosities();
  if (S.tab === 'worpen')    return buildWorpen();
  if (S.tab === 'technieken') return buildTechnieken();
  if (S.tab === 'logboek')   return buildLogboek();
  return '';
}

// ── POSITIONS ──
function buildPosities() {
  return `
    <div class="section-label">Tap a position to see submissions</div>
    <div class="grid">
      ${POSITIES.map(p => {
        const subs = S.technieken.filter(t => t.pos === p.id);
        return `<div class="pos-card" style="border-color:${p.kleur}" data-pos="${p.id}">
          <div class="pos-japans" style="color:${p.kleur}">${p.japans}</div>
          <div class="pos-naam">${p.naam}</div>
          <div class="pos-footer">
            <div><span class="pos-count-num" style="color:${subs.length?p.kleur:'#ccc'}">${subs.length}</span> <span style="color:var(--muted);font-size:13px">submission${subs.length!==1?'s':''}</span></div>
            <div class="pos-bekijk" style="color:${p.kleur}">View →</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── DETAIL PAGE ──
function buildDetailPage() {
  const pos = POSITIES.find(p => p.id === S.positieId);
  if (!pos) return '';
  const subs = S.technieken.filter(t => t.pos === pos.id);
  return `
    <div class="detail-header" style="border-bottom-color:${pos.kleur}33">
      <button class="btn-back" id="btn-back">← Back</button>
      <div>
        <div class="detail-pos-japans" style="color:${pos.kleur}">${pos.japans}</div>
        <div class="detail-pos-naam">${pos.naam}</div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-sub-tabs">
        <button class="detail-sub-tab ${S.detailSubTab==='subs'?'active':''}" data-sub="subs">⚔️ Submissions (${subs.length})</button>
        <button class="detail-sub-tab ${S.detailSubTab==='escape'?'active':''}" data-sub="escape">🛡 Escape & Counter</button>
      </div>
      ${S.detailSubTab === 'subs' ? buildSubsTab(pos, subs) : buildEscapeTab(pos)}
    </div>
    ${S.modal ? buildModal() : ''}
  `;
}

function buildSubsTab(pos, subs) {
  return `
    ${subs.length === 0
      ? '<div class="empty">No submissions linked to this position yet.</div>'
      : `<div class="grid">${subs.map(t => buildTechCard(t, false)).join('')}</div>`}
    <button class="btn-add-sub" style="color:${pos.kleur};border:1px solid ${pos.kleur}" id="btn-add-sub">+ Add technique to ${pos.naam}</button>
  `;
}

function buildEscapeTab(pos) {
  const e = pos.escape;
  if (!e) return '<div class="empty">No escape information available.</div>';
  return `
    <div class="escape-situatie" style="border-color:${pos.kleur}">📍 ${e.situatie}</div>
    ${e.videoId ? `<div class="video-btn-wrap"><a class="video-btn" href="https://www.youtube.com/watch?v=${e.videoId}"><span class="play-icon"></span>Escape video on YouTube</a></div>` : ''}
    <div class="section-label" style="margin-top:16px">How to escape</div>
    ${e.stappen.map((s,i) => `
      <div class="escape-stap">
        <div class="stap-nr" style="background:${pos.kleur}22;border:1px solid ${pos.kleur}55;color:${pos.kleur}">${i+1}</div>
        <div>
          <div class="stap-titel">${s.titel}</div>
          <div class="stap-uitleg">${s.uitleg}</div>
        </div>
      </div>`).join('')}
    <div class="escape-counter" style="background:${pos.kleur}10;border:1px solid ${pos.kleur}33">
      <div class="escape-counter-label" style="color:${pos.kleur}">⚔️ Counter</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.6">${e.counter}</div>
    </div>
  `;
}

// ── TECHNIQUE CARD ──
function buildTechCard(t, showPos) {
  const cat = CATS.find(c => c.id === t.cat);
  const pos = POSITIES.find(p => p.id === t.pos);
  const color = cat ? cat.color : '#888';
  const u = UITLEG[t.naam];
  const vid = VIDEOS[t.naam];
  const open = S.uitlegOpen[t.id];
  const utab = S.uitlegTab[t.id] || 'video';
  const hasUitleg = u || vid;

  return `<div class="tech-card" style="border-color:${color}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div class="tech-cat-label" style="color:${color}">${cat?cat.icon+' '+cat.label:''}</div>
        <div class="tech-naam">${t.naam}</div>
        <div class="tech-tags">
          ${showPos && pos ? `<span class="tech-tag" style="color:${pos.kleur};border-color:${pos.kleur}44" data-goto-pos="${pos.id}">${pos.naam} →</span>` : ''}
        </div>
      </div>
      <button class="btn-fav" data-fav="${t.id}" style="color:${t.fav?'#f59e0b':'#d1d5db'}">${t.fav?'★':'☆'}</button>
    </div>
    ${t.notities ? `<div class="tech-notities">${t.notities}</div>` : ''}
    ${hasUitleg ? `
      <button class="uitleg-toggle" style="border:1px solid ${open?color:color+'55'};color:${open?color:color+'88'};background:${open?'var(--faint)':'transparent'}" data-toggle-uitleg="${t.id}">
        ${open ? '▲ Hide' : '▼ Details & Video'}
      </button>
      ${open ? `
        <div class="uitleg-panel" style="border:1px solid ${color}33;border-top:2px solid ${color}">
          <div class="uitleg-tabs">
            ${vid ? `<button class="uitleg-tab ${utab==='video'?'active':''}" style="${utab==='video'?'color:'+color+';border-color:'+color:''}" data-uitleg-tab="${t.id}:video">▶ Video</button>` : ''}
            ${u   ? `<button class="uitleg-tab ${utab==='stappen'?'active':''}" style="${utab==='stappen'?'color:'+color+';border-color:'+color:''}" data-uitleg-tab="${t.id}:stappen">📋 Steps</button>` : ''}
            ${u&&u.verdediging ? `<button class="uitleg-tab ${utab==='verdediging'?'active':''}" style="${utab==='verdediging'?'color:'+color+';border-color:'+color:''}" data-uitleg-tab="${t.id}:verdediging">🛡 Defense</button>` : ''}
          </div>
          <div class="uitleg-body">
            ${utab==='video' && vid ? buildVideoTab(t.naam, vid) : ''}
            ${utab==='stappen' && u ? buildStappenTab(u, color) : ''}
            ${utab==='verdediging' && u && u.verdediging ? buildVerdTab(u.verdediging) : ''}
          </div>
        </div>` : ''}
    ` : ''}
    <div class="tech-actions">
      <button class="btn-sm" data-edit="${t.id}">Edit</button>
      <button class="btn-sm btn-del" data-del="${t.id}">Delete</button>
    </div>
  </div>`;
}

function buildVideoTab(naam, videoId) {
  return `<div class="video-btn-wrap"><a class="video-btn" href="https://www.youtube.com/watch?v=${videoId}"><span class="play-icon"></span>Watch on YouTube</a></div>`;
}

function buildStappenTab(u, color) {
  return `
    <div class="section-label">Execution</div>
    ${u.stappen.map(s => `
      <div class="stap">
        <div class="stap-nr" style="background:${color}22;border:1px solid ${color}55;color:${color}">${s.nr}</div>
        <div style="flex:1">
          <div class="stap-titel">${s.titel}</div>
          <div class="stap-uitleg">${s.uitleg}</div>
          <div class="stap-lichaam" style="border-color:${color}44"><strong style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Body: </strong>${s.lichaam}</div>
          <div class="stap-aandacht"><span style="color:#f59e0b">!</span>${s.aandacht}</div>

    <div class="finishing-grid">
      <div class="finish-box" style="background:${color}12;border:1px solid ${color}33">
        <div class="finish-label" style="color:${color}">🎯 Finishing</div>
        <div class="finish-text">${u.finishing}</div>
      </div>
      <div class="finish-box" style="background:var(--accent-light);border:1px solid #fecaca">
        <div class="finish-label" style="color:var(--accent)">⚠ Common mistake</div>
        <div class="finish-text">${u.veelgemaakte_fout}</div>
      </div>

}

function buildVerdTab(verdediging) {
  return `
    <div class="section-label">Defense against this technique</div>
    ${verdediging.map(v => `
      <div class="verd-item">
        <div class="verd-icon-wrap">🛡</div>
        <div>
          <div class="verd-titel">${v.titel}</div>
          <div class="verd-uitleg">${v.uitleg}</div>
        </div>
      </div>`).join('')}`;
}

// ── THROWS ──
function buildWorpen() {
  return WORPEN.map(cat => `
    <div style="margin-bottom:32px">
      <div class="worp-cat-header">
        <div style="width:4px;height:36px;background:${cat.kleur};border-radius:2px;flex-shrink:0"></div>
        <div>
          <div class="worp-cat-title" style="color:${cat.kleur}">${cat.cat}</div>
          <div class="worp-cat-desc">${cat.desc}</div>
        </div>
      </div>
      <div class="grid">
        ${cat.worpen.map(w => `
          <div class="worp-card" style="border-color:${cat.kleur}">
            <div class="worp-naam">${w.naam}</div>
            <div class="worp-japans">${w.japans}</div>
            <div class="worp-uitleg">${w.uitleg}</div>
            <div class="kuzushi-box" style="border-color:${cat.kleur}88;background:${cat.kleur}10">
              <div class="kuzushi-label" style="color:${cat.kleur}">Kuzushi</div>
              <div class="kuzushi-text">${w.kuzushi}</div>
            </div>
            ${w.videoId ? `<div class="video-btn-wrap"><a class="video-btn" href="https://www.youtube.com/watch?v=${w.videoId}"><span class="play-icon"></span>Video</a></div>` : ''}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── ALL TECHNIQUES ──
function buildTechnieken() {
  const filtered = S.technieken.filter(t => {
    if (S.catFilter !== 'alle' && t.cat !== S.catFilter) return false;
    if (S.favFilter && !t.fav) return false;
    if (S.zoek) {
      const q = S.zoek.toLowerCase();
      if (!t.naam.toLowerCase().includes(q) && !t.notities.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  return `
    <div class="search-bar">
      <input type="text" id="tech-search" placeholder="Search..." value="${esc(S.zoek)}">
      <button class="btn-fav-filter ${S.favFilter?'on':''}" id="fav-filter-btn">★ Favs</button>
    </div>
    <div class="filter-bar">
      <button class="cat-btn ${S.catFilter==='alle'?'on':''}" style="${S.catFilter==='alle'?'background:#1e3a5f;color:#fff;border-color:#1e3a5f':''}" data-cat="alle">All</button>
      ${CATS.map(c => `<button class="cat-btn ${S.catFilter===c.id?'on':''}" style="${S.catFilter===c.id?'background:'+c.color+';border-color:'+c.color:''}" data-cat="${c.id}">${c.icon} ${c.label}</button>`).join('')}
    </div>
    ${filtered.length === 0
      ? '<div class="empty">No techniques found.</div>'
      : `<div class="grid">${filtered.map(t => buildTechCard(t, true)).join('')}</div>`}`;
}

// ── LOGBOEK ──
function buildLogboek() {
  return `
    <div class="log-sub-tabs">
      <button class="log-sub-tab ${S.logSubTab==='training'?'active':''}" data-logtab="training">📅 Training Log</button>
      <button class="log-sub-tab ${S.logSubTab==='sparring'?'active':''}" data-logtab="sparring">🥊 Sparring Notes</button>
    </div>
    ${S.logSubTab === 'training' ? buildTrainingLog() : buildSparringLog()}`;
}

function buildTrainingLog() {
  const entries = [...S.logboek].reverse();
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${S.logboek.length} session${S.logboek.length!==1?'s':''} logged</div>
      <button class="btn-primary" id="btn-open-log-form">+ Log Session</button>
    </div>
    ${entries.map(log => `
      <div class="log-entry">
        <div class="log-entry-header">
          <div>
            <div class="log-datum">${fmtDate(log.datum)}</div>
            ${log.partner ? `<div class="log-partner">👤 with ${log.partner}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="log-count-badge">${(log.technieken||[]).length} techniques</span>
            <button class="btn-del-entry" data-del-log="${log.id}">✕</button>
          </div>
        </div>
        ${(log.technieken||[]).length > 0 ? `<div class="tech-chips">${log.technieken.map(n => `<span class="tech-chip">${n}</span>`).join('')}</div>` : ''}
        ${log.notities ? `<div class="log-notities">${log.notities}</div>` : ''}
      </div>`).join('')}
    ${entries.length === 0 ? '<div class="empty">No sessions logged yet.</div>' : ''}`;
}

function buildSparringLog() {
  const entries = [...S.sparring].reverse();
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${S.sparring.length} session${S.sparring.length!==1?'s':''} logged</div>
      <button class="btn-primary" style="background:var(--accent)" id="btn-open-sparring-form">+ Log Sparring</button>
    </div>
    ${entries.map(log => `
      <div class="log-entry sparring-entry">
        <div class="log-entry-header">
          <div>
            <div class="log-datum">${fmtDate(log.datum)}</div>
            ${log.partner ? `<div class="log-partner">🥊 vs ${log.partner}</div>` : ''}
          </div>
          <button class="btn-del-entry" data-del-sparring="${log.id}">✕</button>
        </div>
        ${log.werkte ? `<div class="sparring-section"><div class="sparring-section-label" style="color:#16a085">✅ What worked</div><div class="sparring-section-text">${log.werkte}</div></div>` : ''}
        ${log.mislukte ? `<div class="sparring-section"><div class="sparring-section-label" style="color:var(--accent)">❌ What did not work</div><div class="sparring-section-text">${log.mislukte}</div></div>` : ''}
        ${log.lessen ? `<div class="takeaway-box"><div class="sparring-section-label" style="color:#92400e">💡 Take to next session</div><div class="sparring-section-text">${log.lessen}</div></div>` : ''}
      </div>`).join('')}
    ${entries.length === 0 ? '<div class="empty">No sparring sessions logged yet.</div>' : ''}`;
}

// ── SEARCH ──
function buildSearchResults() {
  const q = S.globaalZoek.toLowerCase().trim();
  function hi(t) {
    const i = t.toLowerCase().indexOf(q);
    if (i < 0) return t;
    return t.slice(0,i) + '<mark>' + t.slice(i,i+q.length) + '</mark>' + t.slice(i+q.length);
  }
  const techs = S.technieken.filter(t => t.naam.toLowerCase().includes(q) || t.notities.toLowerCase().includes(q));
  const poss = POSITIES.filter(p => p.naam.toLowerCase().includes(q) || p.japans.toLowerCase().includes(q));
  const total = techs.length + poss.length;
  return `
    <div class="search-results-label">${total} result${total!==1?'s':''} for "${S.globaalZoek}"</div>
    ${poss.length > 0 ? `
      <div class="result-group-label">Positions (${poss.length})</div>
      <div class="grid" style="margin-bottom:24px">
        ${poss.map(p => {
          const subs = S.technieken.filter(t => t.pos === p.id);
          return `<div class="pos-card" style="border-color:${p.kleur}" data-pos="${p.id}">
            <div class="pos-japans" style="color:${p.kleur}">${p.japans}</div>
            <div class="pos-naam">${hi(p.naam)}</div>
            <div class="pos-footer">
              <div><span class="pos-count-num" style="color:${p.kleur}">${subs.length}</span> <span style="color:var(--muted);font-size:13px">submissions</span></div>
              <div class="pos-bekijk" style="color:${p.kleur}">View →</div>
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}
    ${techs.length > 0 ? `
      <div class="result-group-label">Techniques (${techs.length})</div>
      <div class="grid">${techs.map(t => buildTechCard(t, true)).join('')}</div>` : ''}
    ${total === 0 ? '<div class="empty">No results found. Try a different search.</div>' : ''}`;
}

// ── MODAL ──
function buildModal() {
  if (S.modal === 'techniek') return buildTechModal();
  if (S.modal === 'log')      return buildLogModal();
  if (S.modal === 'sparring') return buildSparringModal();
  return '';
}

function buildTechModal() {
  const t = S.editId ? S.technieken.find(x => x.id === S.editId) : null;
  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">${t ? 'Edit Technique' : 'New Technique'}</div>
      <label class="form-label">Name</label>
      <input class="form-input" id="f-naam" type="text" value="${esc(t?t.naam:'')}" placeholder="e.g. Americana">
      <label class="form-label">Category</label>
      <select class="form-input" id="f-cat">
        ${CATS.map(c => `<option value="${c.id}" ${(t&&t.cat===c.id)?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
      </select>
      <label class="form-label">Link to position (optional)</label>
      <select class="form-input" id="f-pos">
        <option value="">— None —</option>
        ${POSITIES.map(p => `<option value="${p.id}" ${(t&&t.pos===p.id)||(S.formPos===p.id&&!t)?'selected':''}>${p.naam}</option>`).join('')}
      </select>
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="f-notities" rows="3" placeholder="Tips, key points...">${esc(t?t.notities:'')}</textarea>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <input type="checkbox" id="f-fav" ${(t&&t.fav)?'checked':''} style="width:16px;height:16px">
        <label for="f-fav" style="font-size:15px;cursor:pointer">★ Mark as favourite</label>
      </div>
      <div class="modal-actions">
        <button class="btn-save" id="btn-save-tech">Save</button>
        <button class="btn-cancel" id="btn-close-modal">Cancel</button>
      </div>
    </div>
  </div>`;
}

function buildLogModal() {
  const today = new Date().toISOString().split('T')[0];
  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" style="color:var(--blue)">Log Training Session</div>
      <label class="form-label">Date</label>
      <input class="form-input" id="f-log-datum" type="date" value="${today}">
      <label class="form-label">Training partner (optional)</label>
      <input class="form-input" id="f-log-partner" type="text" placeholder="Partner name...">
      <label class="form-label">Techniques practiced</label>
      <div class="techniek-list" id="techniek-list">
        ${TECHNIEK_CATS.map(cat => `
          <div class="techniek-cat-label" style="color:${cat.kleur}">${cat.label}</div>
          ${cat.items.map(naam => `
            <label class="techniek-check-row">
              <input type="checkbox" class="log-tech-check" value="${esc(naam)}">
              <span class="techniek-check-label">${naam}</span>
            </label>`).join('')}
        `).join('')}
      </div>
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="f-log-notities" rows="3" placeholder="What did you learn? What went well?"></textarea>
      <div class="modal-actions">
        <button class="btn-save" id="btn-save-log">Save Session</button>
        <button class="btn-cancel" id="btn-close-modal">Cancel</button>
      </div>
    </div>
  </div>`;
}

function buildSparringModal() {
  const today = new Date().toISOString().split('T')[0];
  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal sparring-form">
      <div class="modal-title">Log Sparring Session</div>
      <label class="form-label">Date</label>
      <input class="form-input" id="f-sp-datum" type="date" value="${today}">
      <label class="form-label">Opponent (optional)</label>
      <input class="form-input" id="f-sp-partner" type="text" placeholder="Name or description...">
      <label class="form-label">✅ What worked?</label>
      <textarea class="form-input" id="f-sp-werkte" rows="3" placeholder="Which techniques worked?"></textarea>
      <label class="form-label">❌ What did not work?</label>
      <textarea class="form-input" id="f-sp-mislukte" rows="3" placeholder="Where did you lose position?"></textarea>
      <label class="form-label">💡 Take to next session?</label>
      <textarea class="form-input" id="f-sp-lessen" rows="3" placeholder="Focus point for next training..."></textarea>
      <div class="modal-actions">
        <button class="btn-save btn-save-sparring" id="btn-save-sparring">Save Session</button>
        <button class="btn-cancel" id="btn-close-modal">Cancel</button>
      </div>
    </div>
  </div>`;
}

// ── HELPERS ──
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
  catch(e) { return d; }
}

// ═══════════════════════════════════════════════════════════
// EVENT DELEGATION — one listener on document
// ═══════════════════════════════════════════════════════════
function bindEvents() {
  // Search inputs — debounced, no render on every keystroke
  const gs = document.getElementById('global-search');
  if (gs) gs.addEventListener('input', e => {
    S.globaalZoek = e.target.value;
    clearTimeout(gs._t);
    gs._t = setTimeout(render, 300);
  });

  const ts = document.getElementById('tech-search');
  if (ts) ts.addEventListener('input', e => {
    S.zoek = e.target.value;
    clearTimeout(ts._t);
    ts._t = setTimeout(render, 300);
  });

  // Import backup file
  const imp = document.getElementById('btn-import');
  if (imp) imp.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.logboek || !data.sparring) { alert('Invalid backup file.'); return; }
        if (!confirm('This will replace your current log data. Continue?')) return;
        S.logboek = data.logboek;
        S.sparring = data.sparring;
        saveLog();
        render();
        alert('Backup imported!');
      } catch(err) {
        alert('Could not read file. Make sure it is a valid backup JSON.');
      }
    };
    reader.readAsText(file);
  });
}

document.addEventListener('click', function(e) {
  const el = e.target;

  // ── Navigation ──
  if (el.dataset.tab) { S.tab = el.dataset.tab; render(); return; }
  if (el.dataset.pos) { S.positieId = el.dataset.pos; S.detailSubTab = 'subs'; render(); return; }
  if (el.dataset.sub) { S.detailSubTab = el.dataset.sub; render(); return; }
  if (el.dataset.logtab) { S.logSubTab = el.dataset.logtab; render(); return; }
  if (el.dataset.gotoPos) { S.positieId = el.dataset.gotoPos; S.detailSubTab = 'subs'; render(); return; }

  // ── Header buttons ──
  if (el.id === 'btn-new-tech') { S.modal = 'techniek'; S.editId = null; S.formPos = null; render(); return; }
  if (el.id === 'btn-back') { S.positieId = null; render(); return; }
  if (el.id === 'btn-add-sub') { S.modal = 'techniek'; S.editId = null; S.formPos = S.positieId; render(); return; }
  if (el.id === 'search-clear') { S.globaalZoek = ''; render(); return; }
  if (el.id === 'fav-filter-btn') { S.favFilter = !S.favFilter; render(); return; }
  if (el.dataset.cat) { S.catFilter = el.dataset.cat; render(); return; }

  // ── Technique actions ──
  if (el.dataset.fav) { const id=parseInt(el.dataset.fav); S.technieken=S.technieken.map(t=>t.id===id?{...t,fav:!t.fav}:t); save(); render(); return; }
  if (el.dataset.edit) { S.modal='techniek'; S.editId=parseInt(el.dataset.edit); S.formPos=null; render(); return; }
  if (el.dataset.del) {
    if (confirm('Delete this technique?')) { S.technieken=S.technieken.filter(t=>t.id!==parseInt(el.dataset.del)); save(); render(); }
    return;
  }
  if (el.dataset.toggleUitleg) { const id=parseInt(el.dataset.toggleUitleg); S.uitlegOpen[id]=!S.uitlegOpen[id]; render(); return; }
  if (el.dataset.uitlegTab) {
    const [id,tab]=el.dataset.uitlegTab.split(':');
    S.uitlegTab[parseInt(id)]=tab; render(); return;
  }

  // ── Log actions ──
  if (el.id === 'btn-export') {
    const data = {
      versie: 1,
      datum: new Date().toISOString(),
      logboek: S.logboek,
      sparring: S.sparring,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'jijitsu-backup-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
    return;
  }
  if (el.id === 'btn-open-log-form') { S.modal = 'log'; render(); return; }
  if (el.id === 'btn-open-sparring-form') { S.modal = 'sparring'; render(); return; }
  if (el.dataset.delLog) {
    if (confirm('Delete this session?')) { S.logboek=S.logboek.filter(l=>l.id!==parseInt(el.dataset.delLog)); saveLog(); render(); }
    return;
  }
  if (el.dataset.delSparring) {
    if (confirm('Delete this sparring note?')) { S.sparring=S.sparring.filter(l=>l.id!==parseInt(el.dataset.delSparring)); saveLog(); render(); }
    return;
  }

  // ── Modal ──
  if (el.id === 'modal-overlay' && el === e.target) { S.modal=null; S.editId=null; render(); return; }
  if (el.id === 'btn-close-modal') { S.modal=null; S.editId=null; render(); return; }

  if (el.id === 'btn-save-tech') {
    const naam = document.getElementById('f-naam').value.trim();
    if (!naam) { alert('Please enter a name.'); return; }
    const cat = document.getElementById('f-cat').value;
    const pos = document.getElementById('f-pos').value || null;
    const notities = document.getElementById('f-notities').value.trim();
    const fav = document.getElementById('f-fav').checked;
    if (S.editId) {
      S.technieken = S.technieken.map(t => t.id===S.editId ? {...t,naam,cat,pos,notities,fav} : t);
    } else {
      S.technieken.push({id:Date.now(),naam,cat,pos,notities,fav});
    }
    save(); S.modal=null; S.editId=null; render(); return;
  }

  if (el.id === 'btn-save-log') {
    e.stopPropagation();
    const datum = document.getElementById('f-log-datum').value;
    const partner = document.getElementById('f-log-partner').value.trim();
    const notities = document.getElementById('f-log-notities').value.trim();
    const technieken = [...document.querySelectorAll('.log-tech-check:checked')].map(cb => cb.value);
    S.logboek.push({id:Date.now(),datum,partner,notities,technieken});
    saveLog(); S.modal=null; render(); return;
  }

  if (el.id === 'btn-save-sparring') {
    e.stopPropagation();
    const datum = document.getElementById('f-sp-datum').value;
    const partner = document.getElementById('f-sp-partner').value.trim();
    const werkte = document.getElementById('f-sp-werkte').value.trim();
    const mislukte = document.getElementById('f-sp-mislukte').value.trim();
    const lessen = document.getElementById('f-sp-lessen').value.trim();
    S.sparring.push({id:Date.now(),datum,partner,werkte,mislukte,lessen});
    saveLog(); S.modal=null; render(); return;
  }
}, true); // capture phase so pos-card click doesn't fire before child button

// Make sure inner buttons don't trigger pos-card navigation
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button[data-fav],button[data-edit],button[data-del],button[data-del-log],button[data-del-sparring],button.uitleg-toggle,button[data-uitleg-tab],button[data-toggle-uitleg]');
  if (btn && btn.closest('.pos-card')) e.stopPropagation();
}, false);

// ── Initial render ──
render();
</script>
